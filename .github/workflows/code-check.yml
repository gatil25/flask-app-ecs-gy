name: Code Scan

on:
    push:
        branches: [main]
jobs:
    linter:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Setup Python 3.12
              uses: actions/setup-python@v5
              with:
                python-version: "3.12"

            - name: Install Linter flake 8
              run: pip install flake8

            - name: scan code for syntax
              run: flake8 app.py



